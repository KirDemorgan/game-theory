# CallCenterOpt — конфигурация сценария
# Дранков А.Е. | Итоговый проект по теории игр

# Интенсивности входящего потока звонков (звонков/час) — сценарии «природы»
lambda_scenarios: [20.0, 50.0, 85.0]

# Средняя производительность оператора (звонков/час)
mu: 12.0

# Стоимость одного оператора (тыс. руб./месяц)
salary_per_operator: 35.0

# Штраф за единицу вероятности ожидания (тыс. руб.)
penalty_factor: 150.0

# Стратегии найма (количество операторов)
strategies: [3, 5, 7, 9, 11]

# Критерий принятия решений: wald | hurwicz | bayes
criterion: "hurwicz"

# Коэффициент оптимизма для критерия Гурвица (0 — пессимист, 1 — оптимист)
alpha: 0.6

# Вероятности сценариев для критерия Байеса (сумма должна равняться 1.0)
probabilities: [0.3, 0.5, 0.2]

# Порог SLA: максимально допустимая вероятность ожидания
sla_p_wait: 0.15
